version: 2
updates:
  - package-ecosystem: npm
    directory: /plugins/gemini-web-bridge
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: zod
        update-types:
          - version-update:semver-major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
